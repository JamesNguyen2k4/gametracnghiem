<!doctype html>
<html lang="vi" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kéo Co Trắc Nghiệm</title>

  <script src="https://cdn.tailwindcss.com/3.4.17"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body class="h-full overflow-auto">
  <div id="app" class="min-h-full bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900">
    <header class="text-center py-4 bg-black/30 backdrop-blur-sm border-b border-white/10">
      <h1
        id="gameTitle"
        class="game-title text-3xl md:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 via-orange-500 to-red-500 drop-shadow-lg"
      >
        🎯 KÉO CO TRẮC NGHIỆM 🎯
      </h1>
      <p class="text-white/70 text-sm mt-1">Trả lời đúng để kéo đội bạn về phía chiến thắng!</p>
      <div class="quiz-picker-wrap">
        <label for="quizSelect" class="quiz-picker-label">Bộ câu hỏi</label>
        <select id="quizSelect" class="quiz-picker-select"></select>
        <button id="loadQuizBtn" type="button" class="quiz-picker-btn">Tải bộ câu hỏi</button>
      </div>
    </header>
    <div class="top-actions">
      <button id="backDashboardBtn" type="button" class="back-btn">
        ← Về Dashboard
      </button>
    </div>
    <main class="flex flex-col lg:flex-row gap-4 p-4 min-h-0 main-layout">
      <!-- ĐỘI A -->
      <section
        id="teamASection"
        class="flex-1 bg-gradient-to-br from-blue-600/90 to-blue-800/90 rounded-2xl p-4 shadow-2xl border-2 border-blue-400/50 backdrop-blur-sm flex flex-col"
      >
        <div class="flex items-center justify-between mb-3">
          <h2 id="teamAName" class="team-title text-2xl font-bold text-white flex items-center gap-2">
            <span class="text-3xl">🔵</span>
            <span>ĐỘI XANH</span>
          </h2>
          <div class="flex items-center gap-3">
            <span id="teamAProgress" class="bg-blue-900/50 px-3 py-1 rounded-full text-white font-semibold text-sm">
              Câu: 1/10
            </span>
          </div>
        </div>

        <div class="bg-white/95 rounded-xl p-4 mb-4 shadow-inner flex-shrink-0">
          <p
            id="teamAQuestion"
            class="question-text text-lg font-semibold text-gray-800 text-center leading-relaxed"
          >
            Đang tải câu hỏi...
          </p>
        </div>

        <div id="teamAOptions" class="grid grid-cols-2 gap-3 flex-1 min-h-0"></div>

        <div
          id="teamAStatus"
          class="mt-3 text-center text-white font-bold text-lg opacity-0 transition-opacity duration-300"
        ></div>
      </section>

      <!-- KHU VỰC KÉO CO -->
      <section
        class="lg:w-80 flex flex-col items-center justify-center bg-gradient-to-b from-amber-900/80 to-amber-950/80 rounded-2xl p-4 shadow-2xl border-2 border-amber-600/50 backdrop-blur-sm"
      >
        <div class="w-full mb-4 flex justify-around items-center">
          <div class="text-center">
            <p class="text-white/70 text-sm mb-1">🔵 Đội A</p>
            <p id="teamAScoreDisplay" class="text-4xl font-extrabold text-blue-400">0</p>
          </div>
          <div class="text-center">
            <p class="text-white/70 text-sm mb-1">vs</p>
            <p class="text-2xl font-bold text-yellow-400">Chênh: <span id="scoreDiff">0</span></p>
          </div>
          <div class="text-center">
            <p class="text-white/70 text-sm mb-1">Đội B 🔴</p>
            <p id="teamBScoreDisplay" class="text-4xl font-extrabold text-red-400">0</p>
          </div>
        </div>

        <div
          class="relative w-full h-48 bg-gradient-to-b from-green-600 to-green-700 rounded-xl overflow-hidden border-4 border-amber-700 shadow-inner"
        >
          <div class="absolute left-1/2 top-0 bottom-0 w-2 bg-white/80 transform -translate-x-1/2 z-20 shadow-lg"></div>

          <div id="ropeSection" class="rope-section absolute top-1/2 left-0 right-0 transform -translate-y-1/2 z-10">
            <div class="h-4 bg-gradient-to-r from-amber-600 via-amber-500 to-amber-600 mx-8 rounded-full shadow-lg border-2 border-amber-800"></div>
            <div
              id="ropeKnot"
              class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-6 h-6 bg-red-600 rounded-full border-2 border-red-800 shadow-lg transition-all duration-500"
            ></div>
          </div>

          <div
            id="teamAPeople"
            class="absolute left-2 top-1/2 transform -translate-y-1/2 flex flex-row-reverse gap-1 z-30 transition-transform duration-500"
          >
            <div class="person flex flex-col items-center">
              <div class="w-8 h-8 bg-blue-500 rounded-full border-2 border-blue-700 flex items-center justify-center text-lg">😤</div>
              <div class="w-4 h-10 bg-blue-600 rounded-b-lg"></div>
            </div>
            <div class="person flex flex-col items-center">
              <div class="w-8 h-8 bg-blue-500 rounded-full border-2 border-blue-700 flex items-center justify-center text-lg">💪</div>
              <div class="w-4 h-10 bg-blue-600 rounded-b-lg"></div>
            </div>
            <div class="person flex flex-col items-center">
              <div class="w-8 h-8 bg-blue-500 rounded-full border-2 border-blue-700 flex items-center justify-center text-lg">😠</div>
              <div class="w-4 h-10 bg-blue-600 rounded-b-lg"></div>
            </div>
          </div>

          <div
            id="teamBPeople"
            class="absolute right-2 top-1/2 transform -translate-y-1/2 flex gap-1 z-30 transition-transform duration-500"
          >
            <div class="person flex flex-col items-center">
              <div class="w-8 h-8 bg-red-500 rounded-full border-2 border-red-700 flex items-center justify-center text-lg">😤</div>
              <div class="w-4 h-10 bg-red-600 rounded-b-lg"></div>
            </div>
            <div class="person flex flex-col items-center">
              <div class="w-8 h-8 bg-red-500 rounded-full border-2 border-red-700 flex items-center justify-center text-lg">💪</div>
              <div class="w-4 h-10 bg-red-600 rounded-b-lg"></div>
            </div>
            <div class="person flex flex-col items-center">
              <div class="w-8 h-8 bg-red-500 rounded-full border-2 border-red-700 flex items-center justify-center text-lg">😠</div>
              <div class="w-4 h-10 bg-red-600 rounded-b-lg"></div>
            </div>
          </div>

          <div class="absolute bottom-0 left-0 right-0 h-4 bg-gradient-to-t from-green-800 to-transparent"></div>
        </div>

        <div id="pullInfo" class="mt-4 text-center">
          <p class="text-white font-bold text-lg">Chênh lệch: <span id="pullForce" class="text-yellow-400">0</span></p>
          <p class="text-white/70 text-sm">Cần <span class="text-yellow-400">4</span> để thắng</p>
        </div>

        <div class="mt-4 flex gap-2">
          <button
            id="resetBtn"
            class="px-4 py-2 bg-gradient-to-r from-orange-500 to-red-500 hover:from-orange-600 hover:to-red-600 text-white font-bold rounded-lg shadow-lg transition-all duration-200 hover:scale-105 text-sm"
          >
            🔄 Chơi lại
          </button>
        </div>
      </section>

      <!-- ĐỘI B -->
      <section
        id="teamBSection"
        class="flex-1 bg-gradient-to-br from-red-600/90 to-red-800/90 rounded-2xl p-4 shadow-2xl border-2 border-red-400/50 backdrop-blur-sm flex flex-col"
      >
        <div class="flex items-center justify-between mb-3">
          <h2 id="teamBName" class="team-title text-2xl font-bold text-white flex items-center gap-2">
            <span class="text-3xl">🔴</span>
            <span>ĐỘI ĐỎ</span>
          </h2>
          <div class="flex items-center gap-3">
            <span id="teamBProgress" class="bg-red-900/50 px-3 py-1 rounded-full text-white font-semibold text-sm">
              Câu: 1/10
            </span>
          </div>
        </div>

        <div class="bg-white/95 rounded-xl p-4 mb-4 shadow-inner flex-shrink-0">
          <p
            id="teamBQuestion"
            class="question-text text-lg font-semibold text-gray-800 text-center leading-relaxed"
          >
            Đang tải câu hỏi...
          </p>
        </div>

        <div id="teamBOptions" class="grid grid-cols-2 gap-3 flex-1 min-h-0"></div>

        <div
          id="teamBStatus"
          class="mt-3 text-center text-white font-bold text-lg opacity-0 transition-opacity duration-300"
        ></div>
      </section>
    </main>

    <div id="winnerOverlay" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden items-center justify-center">
      <div
        class="winner-popup relative bg-gradient-to-br from-yellow-400 via-orange-500 to-red-500 rounded-3xl p-8 text-center shadow-2xl border-4 border-yellow-300 max-w-md mx-4"
      >
        <div class="absolute inset-0 overflow-hidden pointer-events-none">
          <div class="confetti-piece absolute top-0 left-1/4 w-3 h-3 bg-blue-500 rounded-sm" style="animation-delay: 0s;"></div>
          <div class="confetti-piece absolute top-0 left-1/2 w-3 h-3 bg-green-500 rounded-sm" style="animation-delay: 0.2s;"></div>
          <div class="confetti-piece absolute top-0 left-3/4 w-3 h-3 bg-purple-500 rounded-sm" style="animation-delay: 0.4s;"></div>
          <div class="confetti-piece absolute top-0 left-1/3 w-3 h-3 bg-pink-500 rounded-sm" style="animation-delay: 0.1s;"></div>
          <div class="confetti-piece absolute top-0 left-2/3 w-3 h-3 bg-yellow-300 rounded-sm" style="animation-delay: 0.3s;"></div>
        </div>

        <div class="text-6xl mb-4">🏆</div>
        <h2 id="winnerTitle" class="text-4xl font-extrabold text-white mb-2 drop-shadow-lg">ĐỘI XANH</h2>
        <p class="text-2xl font-bold text-white/90 mb-6">CHIẾN THẮNG! 🎉</p>
        <button
          id="winnerResetBtn"
          class="px-8 py-3 bg-white text-orange-600 font-extrabold rounded-full shadow-lg hover:scale-105 transition-transform duration-200 text-xl"
        >
          🔄 Chơi lại
        </button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
